modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="${mod_website}/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_website}"
logoFile="assets/${mod_id}/icon.png"
authors="${mod_author}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="legendarytooltips"
type="required"
versionRange="[${legendary_tooltips_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="equipmentcompare"
type="required"
versionRange="[${equipment_compare_version},)"
ordering="NONE"
side="BOTH"